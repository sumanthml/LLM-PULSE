name: 24/7 LLM-Pulse Ingestion & Inference Pipeline

on:
  schedule:
    # Triggers an automated workflow run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permits manual run execution clicks on the GitHub interface

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Test Automation Suites (CI/CD Quality Gate)
        run: |
          pytest tests/ -v

      - name: Execute ML Pipeline Engine (Inference Core)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: "sunny1820f/llm-pulse-data"
        run: |
          python src/main.py